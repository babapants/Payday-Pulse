<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payday Pulse - Cloud Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; --light: #ecf0f1; --accent: #3498db; --gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: var(--dark); padding: 10px; margin: 0; }
        .container { max-width: 650px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--dark); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card.yearly { background: var(--accent); grid-column: span 2; }
        .stat-card h2 { margin: 5px 0; font-size: 1.8rem; color: var(--primary); }
        
        section { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 2px solid var(--light); padding-bottom: 5px; }
        
        .flex-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; width: 100%; }
        button.secondary { background: var(--gold); }
        button.del-btn { background: var(--danger); width: auto; padding: 2px 8px; }
        
        .sync-status { text-align: center; font-size: 0.7rem; color: var(--primary); margin-bottom: 10px; }
        .bill-item, .archive-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .chart-bar { height: 8px; background: var(--accent); border-radius: 4px; margin-top: 4px; transition: width 0.5s; }
    </style>
</head>
<body>

<div class="container">
    <div class="sync-status" id="status">● Cloud Sync Active</div>
    
    <section id="loginSection">
        <h3>☁️ Device Sync</h3>
        <p style="font-size: 0.8rem; color: #666;">Enter a "Secret Key" to sync across devices.</p>
        <div class="flex-group">
            <input type="text" id="userSecret" placeholder="e.g. MyPrivateVault123">
            <button style="width: 120px" onclick="initSync()">Connect</button>
        </div>
    </section>

    <div id="mainApp" style="display:none;">
        <div class="stat-grid">
            <div class="stat-card">
                <small>Daily Limit</small>
                <h2 id="dailyLimit">£0.00</h2>
                <small id="daysRemaining">0 days left</small>
            </div>
            <div class="stat-card">
                <small>Monthly Bills</small>
                <h2 id="totalMonthlyBills">£0.00</h2>
                <small>Fixed Costs</small>
            </div>
            <div class="stat-card yearly">
                <small>Yearly Projection (Fixed + Current Spend Rate)</small>
                <h2 id="yearlyTotal">£0.00</h2>
            </div>
        </div>

        <section>
            <h3>1. Setup & Bills</h3>
            <div class="flex-group">
                <input type="number" id="balance" placeholder="Bank Balance £" oninput="saveToCloud()">
                <input type="date" id="payday" onchange="saveToCloud()">
            </div>
            <div class="flex-group">
                <input type="text" id="billName" placeholder="Rent/Gym">
                <input type="number" id="billAmount" placeholder="£">
                <button style="width:80px" onclick="addBill()">Add</button>
            </div>
            <div id="billList"></div>
        </section>

        <section>
            <h3>2. Log Purchase</h3>
            <div class="flex-group">
                <input type="text" id="spendDesc" placeholder="Coffee/Petrol">
                <input type="number" id="spendAmount" placeholder="£">
                <select id="catSelect"></select>
            </div>
            <button onclick="addSpend()">Add Entry</button>
        </section>

        <section>
            <h3>3. Monthly Split</h3>
            <div id="chart"></div>
            <button class="secondary" style="margin-top:15px;" onclick="archiveMonth()">Close & Archive Month</button>
        </section>

        <section>
            <h3>Archives</h3>
            <div id="archiveList"></div>
        </section>
    </div>
</div>

<script>
    // --- STEP 1: REPLACE WITH YOUR FIREBASE KEYS ---
    const firebaseConfig = {
        apiKey: "AIzaSyBLa-VYa8hplcrGKm_9chflXdPEfBQDvuo",
        authDomain: "payday-pulse.firebaseapp.com",
        databaseURL: "https://payday-pulse-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "payday-pulse",
        storageBucket: "payday-pulse.firebasestorage.app",
        messagingSenderId: "258006926401",
        appId: "1:258006926401:web:c1c4dd4eb04817909ff2c0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let state = {
        balance: 0, payday: '', bills: [], spends: [], archives: [],
        categories: ['Food', 'Bills', 'Transport', 'Fun', 'Health']
    };

    let userPath = '';

    function initSync() {
        const secret = document.getElementById('userSecret').value.trim();
        if(!secret) return alert("Please enter a secret key");
        
        userPath = 'users/' + btoa(secret); // Simple base64 encoding for the key
        
        // Listen for cloud changes
        db.ref(userPath).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                state = data;
                document.getElementById('balance').value = state.balance || '';
                document.getElementById('payday').value = state.payday || '';
                render();
            }
        });

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        render();
    }

    function saveToCloud() {
        if(!userPath) return;
        state.balance = parseFloat(document.getElementById('balance').value) || 0;
        state.payday = document.getElementById('payday').value;
        db.ref(userPath).set(state);
    }

    function addBill() {
        const name = document.getElementById('billName').value;
        const amt = parseFloat(document.getElementById('billAmount').value);
        if(name && amt) {
            state.bills.push({ name, amount: amt, id: Date.now() });
            document.getElementById('billName').value = '';
            document.getElementById('billAmount').value = '';
            saveToCloud();
        }
    }

    function deleteBill(id) {
        state.bills = state.bills.filter(b => b.id !== id);
        saveToCloud();
    }

    function addSpend() {
        const desc = document.getElementById('spendDesc').value;
        const amt = parseFloat(document.getElementById('spendAmount').value);
        const cat = document.getElementById('catSelect').value;
        if(desc && amt) {
            state.spends.push({ desc, amount: amt, cat });
            state.balance -= amt;
            document.getElementById('balance').value = state.balance.toFixed(2);
            document.getElementById('spendDesc').value = '';
            document.getElementById('spendAmount').value = '';
            saveToCloud();
        }
    }

    function archiveMonth() {
        if(confirm("Archive this month? This resets spending but keeps bills.")) {
            const total = state.spends.reduce((s, x) => s + x.amount, 0);
            const monthLabel = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
            state.archives.push({ month: monthLabel, total: total });
            state.spends = [];
            saveToCloud();
        }
    }

    function render() {
        const totalBills = state.bills.reduce((s, b) => s + b.amount, 0);
        const totalSpends = state.spends.reduce((s, b) => s + b.amount, 0);
        const today = new Date();
        const payday = new Date(state.payday);
        const diffDays = Math.ceil((payday - today) / (1000 * 60 * 60 * 24)) || 1;
        
        document.getElementById('dailyLimit').innerText = `£${Math.max(0, state.balance / Math.max(1, diffDays)).toFixed(2)}`;
        document.getElementById('totalMonthlyBills').innerText = `£${totalBills.toFixed(2)}`;
        document.getElementById('yearlyTotal').innerText = `£${((totalBills + totalSpends) * 12).toLocaleString()}`;
        document.getElementById('daysRemaining').innerText = `${Math.max(0, diffDays)} days left`;

        document.getElementById('billList').innerHTML = state.bills.map(b => `
            <div class="bill-item" style="display:flex; justify-content:space-between">
                <span>${b.name}: <strong>£${b.amount}</strong></span>
                <button class="del-btn" onclick="deleteBill(${b.id})">x</button>
            </div>
        `).join('');

        document.getElementById('catSelect').innerHTML = state.categories.map(c => `<option>${c}</option>`).join('');

        const catTotals = {};
        state.spends.forEach(s => catTotals[s.cat] = (catTotals[s.cat] || 0) + s.amount);
        document.getElementById('chart').innerHTML = Object.keys(catTotals).map(c => `
            <div style="margin-bottom:8px">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem"><span>${c}</span><span>£${catTotals[c].toFixed(2)}</span></div>
                <div class="chart-bar" style="width: ${Math.min(100, (catTotals[c]/1000)*100)}%"></div>
            </div>
        `).join('');

        document.getElementById('archiveList').innerHTML = state.archives.slice().reverse().map(a => `
            <div class="archive-item"><strong>${a.month}</strong>: £${a.total.toFixed(2)} spent</div>
        `).join('');
    }
</script>

</body>
</html>
